<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AstroFib V7.2 - SMC & Liquidity Radar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0B1120; --bg-panel: #151E32; --bg-card: #1E293B; --border-soft: #334155;
            --text-main: #F8FAFC; --text-muted: #94A3B8;
            --teal-soft: #2DD4BF; --rose-soft: #FB7185; --gold-soft: #FBBF24; --purple-soft: #A78BFA;
        }
        
        body { margin: 0; padding: 15px; padding-bottom: 80px; background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden;}
        
        /* OMNI HEADER STANDARD */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-soft); padding-bottom: 15px; margin-bottom: 20px; overflow-x: auto;}
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 24px; margin: 0; color: var(--text-main); font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; margin-right: 20px;}
        .v-badge { font-size: 11px; color: var(--purple-soft); border: 1px solid var(--purple-soft); padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle;}
        
        .controls { display: flex; gap: 8px; white-space: nowrap;}
        button { background: var(--bg-panel); border: 1px solid var(--border-soft); color: var(--text-muted); padding: 10px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.2s ease;}
        button:hover { color: var(--text-main); border-color: var(--text-muted); }
        .btn-active { background: rgba(167, 139, 250, 0.1); border-color: var(--purple-soft); color: var(--purple-soft); }
        .btn-sync { background: rgba(45, 212, 191, 0.1); border-color: rgba(45, 212, 191, 0.3); color: var(--teal-soft); margin-left: 10px;}

        /* SMC PANEL */
        .smc-control { background: var(--bg-panel); border: 1px solid var(--border-soft); border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px;}
        .input-group { display: flex; align-items: center; gap: 10px; }
        .input-group label { font-family: 'Space Grotesk'; font-weight: 700; color: var(--text-muted); font-size: 14px;}
        .input-group input { background: var(--bg-base); border: 1px solid var(--border-soft); color: var(--text-main); padding: 10px 15px; border-radius: 8px; font-family: 'Space Grotesk'; font-weight: 700; font-size: 16px; width: 150px; text-transform: uppercase; outline: none;}
        .input-group input:focus { border-color: var(--teal-soft); }

        .price-display { text-align: right; }
        .p-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 4px;}
        .p-val { font-size: 28px; font-family: 'Space Grotesk'; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;}

        /* LIQUIDITY ZONES */
        .zone-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .zone-container { grid-template-columns: 1fr; } }
        
        .l-box { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 14px; padding: 20px; position: relative; overflow: hidden;}
        .l-title { font-family: 'Space Grotesk'; font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
        
        .tb-header { display: grid; grid-template-columns: 1fr 1fr 1fr; font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed var(--border-soft);}
        .tb-row { display: grid; grid-template-columns: 1fr 1fr 1fr; font-size: 14px; font-family: 'Space Grotesk'; font-weight: 600; margin-bottom: 8px; position: relative; z-index: 2; padding: 4px 0;}
        
        /* Bar Latar Belakang untuk visualisasi volume */
        .vol-bar { position: absolute; top: 0; right: 0; height: 100%; z-index: 1; border-radius: 4px; opacity: 0.15; transition: width 0.3s ease;}
        .bar-buy { background-color: var(--teal-soft); left: 0; right: auto;}
        .bar-sell { background-color: var(--rose-soft); }

        .c-buy { color: var(--teal-soft); } .c-sell { color: var(--rose-soft); }
        .c-vol { color: var(--text-main); text-align: right;}
        .c-sum { color: var(--text-muted); text-align: right;}

        .whale-alert { background: rgba(0,0,0,0.3); border: 1px dashed var(--border-soft); border-radius: 8px; padding: 15px; margin-top: 20px; display: flex; align-items: center; gap: 15px;}
        .w-icon { font-size: 24px; }
        .w-text { flex-grow: 1; }
        .w-lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; text-transform: uppercase;}
        .w-val { font-size: 18px; font-family: 'Space Grotesk'; font-weight: 700;}

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); border: 1px dashed var(--border-soft); border-radius: 12px; margin-top: 20px;}
    </style>
</head>
<body>

    <header>
        <h1>SYS.SMC <span class="v-badge">LIQUIDITY RADAR</span></h1>
        <div class="controls">
            <button onclick="window.location.href='index.html'">📊 KARTU</button>
            <button onclick="window.location.href='bubble.html'">🫧 BUBBLE</button>
            <button class="btn-active" onclick="window.location.href='smc.html'">🐋 SMC</button>
            <button onclick="window.location.href='web3.html'">🪂 WEB3</button>
            <button onclick="window.location.href='journal.html'">📓 JURNAL</button>
            <button onclick="window.location.href='news.html'">📰 BERITA</button>
        </div>
    </header>

    <div class="smc-control">
        <div class="input-group">
            <label>SIMBOL KOIN:</label>
            <input type="text" id="coin-input" value="BTC" placeholder="BTC">
            <button class="btn-sync" onclick="scanSMC()" id="btn-scan">PINDAI LIKUIDITAS</button>
        </div>
        <div class="price-display">
            <div class="p-lbl">HARGA SPOT (BINANCE)</div>
            <div class="p-val" id="live-price">$0.00</div>
        </div>
    </div>

    <div id="radar-content">
        <div class="empty-state">Masukkan simbol koin (contoh: BTC, SOL, PEPE) lalu tekan Pindai untuk menyadap Buku Pesanan Binance.</div>
    </div>

    <script>
        const formatMoney = (num) => { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(num); };
        const formatVol = (num) => { 
            if(num >= 1000000) return (num/1000000).toFixed(2) + 'M';
            if(num >= 1000) return (num/1000).toFixed(2) + 'K';
            return num.toFixed(2);
        };

        async function scanSMC() {
            let symbolInput = document.getElementById('coin-input').value.trim().toUpperCase();
            if(!symbolInput) return;
            
            // Auto-tambah USDT
            if (!symbolInput.endsWith('USDT') && !symbolInput.endsWith('FDUSD') && !symbolInput.endsWith('USDC')) {
                symbolInput += 'USDT';
            }
            document.getElementById('coin-input').value = symbolInput;
            
            const btn = document.getElementById('btn-scan');
            const content = document.getElementById('radar-content');
            
            btn.innerText = "MENYADAP BINANCE...";
            content.innerHTML = `<div class="empty-state">Menghubungi satelit dan mencari jalur anti-blokir untuk ${symbolInput}...</div>`;

            try {
                // SISTEM AUTO-ROUTING (ANTI-BLOKIR ISP)
                const baseUrls = [
                    'https://data-api.binance.vision', // Jalur Data Publik (Paling kebal blokir)
                    'https://api.binance.me',          // Mirror Server 1
                    'https://api4.binance.com',        // Mirror Server 2
                    'https://api.binance.com'          // Main Server
                ];

                let priceData = null;
                let depthData = null;

                // Coba tembus satu per satu
                for (let url of baseUrls) {
                    try {
                        const priceRes = await fetch(`${url}/api/v3/ticker/price?symbol=${symbolInput}`);
                        if (priceRes.ok) {
                            priceData = await priceRes.json();
                            const depthRes = await fetch(`${url}/api/v3/depth?symbol=${symbolInput}&limit=100`);
                            depthData = await depthRes.json();
                            console.log("Berhasil menembus via:", url);
                            break; // Stop mencari kalau sudah tembus
                        }
                    } catch (err) {
                        console.warn(`Gagal menembus ${url}, mencoba jalur lain...`);
                    }
                }

                // Jika semua jalur gagal
                if (!priceData || !depthData) {
                    throw new Error("Semua rute satelit diblokir oleh penyedia internet Anda.");
                }

                const currentPrice = parseFloat(priceData.price);
                let dec = currentPrice < 1 ? 6 : 2;
                document.getElementById('live-price').innerText = "$" + currentPrice.toLocaleString(undefined, {minimumFractionDigits: dec, maximumFractionDigits: dec});

                let bids = depthData.bids.map(b => ({ price: parseFloat(b[0]), amt: parseFloat(b[1]), volUSD: parseFloat(b[0]) * parseFloat(b[1]) }));
                let asks = depthData.asks.map(a => ({ price: parseFloat(a[0]), amt: parseFloat(a[1]), volUSD: parseFloat(a[0]) * parseFloat(a[1]) }));

                let maxBid = bids.reduce((max, obj) => (obj.volUSD > max.volUSD) ? obj : max, bids[0]);
                let maxAsk = asks.reduce((max, obj) => (obj.volUSD > max.volUSD) ? obj : max, asks[0]);

                let sumBidsUSD = 0; bids.forEach(b => { sumBidsUSD += b.volUSD; b.sumUSD = sumBidsUSD; });
                let sumAsksUSD = 0; asks.forEach(a => { sumAsksUSD += a.volUSD; a.sumUSD = sumAsksUSD; });

                let maxVolRender = Math.max(...bids.slice(0, 15).map(b => b.volUSD), ...asks.slice(0, 15).map(a => a.volUSD));

                let bidsHtml = '';
                bids.slice(0, 15).forEach(b => {
                    let wPct = (b.volUSD / maxVolRender) * 100;
                    bidsHtml += `
                    <div style="position:relative; margin-bottom:6px;">
                        <div class="vol-bar bar-buy" style="width: ${wPct}%;"></div>
                        <div class="tb-row">
                            <span class="c-buy">${b.price.toLocaleString(undefined, {minimumFractionDigits: dec, maximumFractionDigits: dec})}</span>
                            <span class="c-vol">${formatVol(b.amt)}</span>
                            <span class="c-sum">${formatVol(b.sumUSD)}</span>
                        </div>
                    </div>`;
                });

                let asksHtml = '';
                asks.slice(0, 15).forEach(a => {
                    let wPct = (a.volUSD / maxVolRender) * 100;
                    asksHtml += `
                    <div style="position:relative; margin-bottom:6px;">
                        <div class="vol-bar bar-sell" style="width: ${wPct}%;"></div>
                        <div class="tb-row">
                            <span class="c-sell">${a.price.toLocaleString(undefined, {minimumFractionDigits: dec, maximumFractionDigits: dec})}</span>
                            <span class="c-vol">${formatVol(a.amt)}</span>
                            <span class="c-sum">${formatVol(a.sumUSD)}</span>
                        </div>
                    </div>`;
                });

                content.innerHTML = `
                <div class="zone-container">
                    <div class="l-box">
                        <div class="l-title" style="color:var(--teal-soft)">🟢 DINDING BELI (BIDS) <span>Support Area</span></div>
                        <div class="tb-header"><div>Harga ($)</div><div style="text-align:right">Koin</div><div style="text-align:right">Total ($)</div></div>
                        ${bidsHtml}
                        
                        <div class="whale-alert" style="border-color: rgba(45, 212, 191, 0.3);">
                            <div class="w-icon">🐋</div>
                            <div class="w-text">
                                <div class="w-lbl">Whale Order Block (Support Terkuat)</div>
                                <div class="w-val" style="color:var(--teal-soft)">$${maxBid.price.toLocaleString(undefined, {minimumFractionDigits: dec, maximumFractionDigits: dec})} <span style="font-size:12px; color:var(--text-muted); font-weight:500;">(${formatMoney(maxBid.volUSD)})</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="l-box">
                        <div class="l-title" style="color:var(--rose-soft)">🔴 DINDING JUAL (ASKS) <span>Resistance Area</span></div>
                        <div class="tb-header"><div>Harga ($)</div><div style="text-align:right">Koin</div><div style="text-align:right">Total ($)</div></div>
                        ${asksHtml}

                        <div class="whale-alert" style="border-color: rgba(251, 113, 133, 0.3);">
                            <div class="w-icon">🧱</div>
                            <div class="w-text">
                                <div class="w-lbl">Whale Order Block (Resisten Terkuat)</div>
                                <div class="w-val" style="color:var(--rose-soft)">$${maxAsk.price.toLocaleString(undefined, {minimumFractionDigits: dec, maximumFractionDigits: dec})} <span style="font-size:12px; color:var(--text-muted); font-weight:500;">(${formatMoney(maxAsk.volUSD)})</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                `;

            } catch(e) {
                content.innerHTML = `<div class="empty-state" style="color:var(--rose-soft)">
                <strong>GAGAL MENYADAP BINANCE</strong><br><br>
                Detail Error: ${e.message}<br><br>
                Saran: Jika masalah berlanjut, aktifkan aplikasi DNS 1.1.1.1 (Cloudflare) di tablet Anda untuk mem-bypass blokir ISP secara permanen tanpa memperlambat koneksi.
                </div>`;
            } finally {
                btn.innerText = "PINDAI LIKUIDITAS";
            }
        }

        document.getElementById("coin-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); scanSMC(); }
        });
        
        window.onload = scanSMC;
    </script>
</body>
</html>
