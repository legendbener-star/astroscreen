<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AstroFib V7.2 - Web3 & Airdrop Radar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0B1120; --bg-panel: #151E32; --bg-card: #1E293B; --border-soft: #334155;
            --text-main: #F8FAFC; --text-muted: #94A3B8;
            --teal-soft: #2DD4BF; --rose-soft: #FB7185; --gold-soft: #FBBF24; --purple-soft: #A78BFA;
        }
        
        body { margin: 0; padding: 15px; padding-bottom: 80px; background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden;}
        
        /* OMNI HEADER STANDARD */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-soft); padding-bottom: 15px; margin-bottom: 20px; overflow-x: auto;}
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 24px; margin: 0; color: var(--text-main); font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; margin-right: 20px;}
        .v-badge { font-size: 11px; color: var(--purple-soft); border: 1px solid var(--purple-soft); padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle;}
        
        .controls { display: flex; gap: 8px; white-space: nowrap;}
        button { background: var(--bg-panel); border: 1px solid var(--border-soft); color: var(--text-muted); padding: 10px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.2s ease;}
        button:hover { color: var(--text-main); border-color: var(--text-muted); }
        .btn-active { background: rgba(167, 139, 250, 0.1); border-color: var(--purple-soft); color: var(--purple-soft); }
        .btn-sync { background: rgba(45, 212, 191, 0.1); border-color: rgba(45, 212, 191, 0.3); color: var(--teal-soft); margin-left: 10px;}

        /* DASHBOARD WEB3 */
        .w-dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 25px; }
        @media (max-width: 768px) { .w-dashboard { grid-template-columns: 1fr; } }
        
        .w-box { background: var(--bg-panel); border: 1px solid var(--border-soft); border-radius: 14px; padding: 20px; display: flex; flex-direction: column; justify-content: center;}
        .w-title { font-family: 'Space Grotesk'; font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
        
        /* PROGRESS BAR */
        .progress-wrap { background: var(--bg-base); border-radius: 10px; height: 12px; width: 100%; overflow: hidden; border: 1px solid var(--border-soft); margin-bottom: 8px;}
        .progress-fill { background: linear-gradient(90deg, var(--purple-soft), var(--teal-soft)); height: 100%; width: 0%; transition: width 0.5s ease;}
        .progress-text { font-size: 12px; color: var(--text-muted); font-weight: 600; text-align: right;}

        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px;}
        .s-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;}
        .s-val { font-size: 24px; font-family: 'Space Grotesk'; font-weight: 700; color: var(--teal-soft);}

        /* GRID TUGAS */
        .section-title { font-family: 'Space Grotesk'; font-size: 16px; font-weight: 600; color: var(--text-muted); margin: 30px 0 15px 0; border-bottom: 1px dashed var(--border-soft); padding-bottom: 10px;}
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        
        .t-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 15px; transition: 0.2s;}
        .t-card:hover { border-color: var(--purple-soft); }
        .t-card.done { opacity: 0.6; background: rgba(0,0,0,0.2); }
        .t-card.done .t-name { text-decoration: line-through; color: var(--text-muted); }
        
        /* Kustom Checkbox */
        .chk-wrap { position: relative; width: 24px; height: 24px; }
        .chk-wrap input { opacity: 0; width: 0; height: 0; }
        .checkmark { position: absolute; top: 0; left: 0; height: 24px; width: 24px; background-color: var(--bg-base); border: 2px solid var(--border-soft); border-radius: 6px; cursor: pointer; transition: 0.2s;}
        .chk-wrap input:checked ~ .checkmark { background-color: var(--teal-soft); border-color: var(--teal-soft); }
        .checkmark:after { content: ""; position: absolute; display: none; left: 8px; top: 4px; width: 5px; height: 10px; border: solid #000; border-width: 0 2px 2px 0; transform: rotate(45deg); }
        .chk-wrap input:checked ~ .checkmark:after { display: block; }

        .t-info { flex-grow: 1; }
        .t-name { font-family: 'Space Grotesk'; font-size: 15px; font-weight: 700; margin-bottom: 4px; transition: 0.2s;}
        .t-reward { font-size: 11px; color: var(--purple-soft); font-weight: 600; background: rgba(167, 139, 250, 0.1); padding: 2px 6px; border-radius: 4px; display: inline-block;}
        
        .btn-link { background: transparent; border: 1px solid var(--border-soft); color: var(--text-main); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.2s;}
        .btn-link:hover { background: var(--border-soft); }
    </style>
</head>
<body>

    <header>
        <h1>SYS.WEB3 <span class="v-badge">AIRDROP RADAR</span></h1>
        <div class="controls">
            <button onclick="window.location.href='index.html'">📊 KARTU</button>
            <button onclick="window.location.href='bubble.html'">🫧 BUBBLE</button>
            <button onclick="window.location.href='smc.html'">🐋 SMC</button>
            <button class="btn-active" onclick="window.location.href='web3.html'">🪂 WEB3</button>
            <button onclick="window.location.href='journal.html'">📓 JURNAL</button>
            <button onclick="window.location.href='news.html'">📰 BERITA</button>
            <button class="btn-sync" onclick="forceSync()">SINKRONISASI</button>
        </div>
    </header>

    <div class="w-dashboard">
        <div class="w-box">
            <div class="w-title">
                <span>RUTINITAS GRINDING HARIAN</span>
                <span id="date-display" style="color:var(--text-muted); font-size:12px; font-family:'Inter'; font-weight:500;">--</span>
            </div>
            <div class="progress-wrap"><div class="progress-fill" id="p-bar"></div></div>
            <div class="progress-text" id="p-text">0 / 0 Selesai</div>
        </div>
        <div class="w-box" style="align-items: center; text-align: center;">
            <div class="s-lbl">ESTIMASI POTENSI (ALPHA)</div>
            <div class="s-val">Tinggi 🔥</div>
            <div style="font-size:11px; color:var(--text-muted); margin-top:5px;">Fokus: Ekosistem Layer-2 & Testnet</div>
        </div>
    </div>

    <div class="section-title">🔥 TUGAS HARIAN (RESET JAM 00:00)</div>
    <div class="task-grid" id="daily-grid"></div>

    <div class="section-title">📆 TUGAS MINGGUAN / KAMPANYE (ONCE A WEEK)</div>
    <div class="task-grid" id="weekly-grid"></div>

    <script>
        // DATABASE TUGAS WEB3 ALPHA
        const tasks = [
            // DAILY
            { id: 'd1', type: 'daily', title: 'Galxe Daily Login', reward: '+10 Pts', url: 'https://galxe.com/' },
            { id: 'd2', type: 'daily', title: 'Berachain Faucet (Artio)', reward: '0.1 BERA', url: 'https://artio.faucet.berachain.com/' },
            { id: 'd3', type: 'daily', title: 'Scroll Testnet Swap', reward: 'Tx Count', url: 'https://scroll.io/' },
            { id: 'd4', type: 'daily', title: 'Linea Daily Check-in', reward: 'LXP', url: 'https://linea.build/' },
            // WEEKLY
            { id: 'w1', type: 'weekly', title: 'Zora Network NFT Mint', reward: 'Volume & Active', url: 'https://zora.co/' },
            { id: 'w2', type: 'weekly', title: 'LayerZero Bridge Cross-Chain', reward: 'Volume', url: 'https://layerzero.network/' },
            { id: 'w3', type: 'weekly', title: 'Wormhole Msg Transfer', reward: 'Tx Active', url: 'https://wormhole.com/' }
        ];

        let taskState = JSON.parse(localStorage.getItem('omni_web3_tasks') || '{}');
        let lastDate = localStorage.getItem('omni_web3_date') || '';
        
        function initWeb3() {
            // Logika Auto-Reset Harian
            const today = new Date().toLocaleDateString('id-ID');
            document.getElementById('date-display').innerText = today;
            
            if (lastDate !== today) {
                // Reset semua tugas 'daily'
                tasks.filter(t => t.type === 'daily').forEach(t => { delete taskState[t.id]; });
                localStorage.setItem('omni_web3_date', today);
                localStorage.setItem('omni_web3_tasks', JSON.stringify(taskState));
            }

            renderTasks();
            updateProgress();
        }

        function toggleTask(id) {
            taskState[id] = !taskState[id];
            localStorage.setItem('omni_web3_tasks', JSON.stringify(taskState));
            
            // Ubah visual kartu secara dinamis
            const card = document.getElementById(`card-${id}`);
            if(taskState[id]) card.classList.add('done');
            else card.classList.remove('done');
            
            updateProgress();
        }

        function updateProgress() {
            const dailyTasks = tasks.filter(t => t.type === 'daily');
            let completed = 0;
            dailyTasks.forEach(t => { if(taskState[t.id]) completed++; });
            
            const pct = dailyTasks.length > 0 ? (completed / dailyTasks.length) * 100 : 0;
            
            document.getElementById('p-bar').style.width = `${pct}%`;
            document.getElementById('p-text').innerText = `${completed} / ${dailyTasks.length} Selesai Hari Ini`;
        }

        function renderTasks() {
            let htmlDaily = ''; let htmlWeekly = '';
            
            tasks.forEach(t => {
                const isDone = taskState[t.id] ? 'checked' : '';
                const doneCls = taskState[t.id] ? 'done' : '';
                
                const cardHtml = `
                <div class="t-card ${doneCls}" id="card-${t.id}">
                    <label class="chk-wrap">
                        <input type="checkbox" onchange="toggleTask('${t.id}')" ${isDone}>
                        <span class="checkmark"></span>
                    </label>
                    <div class="t-info">
                        <div class="t-name">${t.title}</div>
                        <div class="t-reward">${t.reward}</div>
                    </div>
                    <a href="${t.url}" target="_blank" class="btn-link">↗</a>
                </div>`;

                if(t.type === 'daily') htmlDaily += cardHtml;
                else htmlWeekly += cardHtml;
            });

            document.getElementById('daily-grid').innerHTML = htmlDaily;
            document.getElementById('weekly-grid').innerHTML = htmlWeekly;
        }

        function forceSync() {
            const btn = document.querySelector('.btn-sync');
            btn.innerText = "MENYINKRONKAN...";
            setTimeout(() => {
                initWeb3();
                btn.innerText = "SINKRONISASI";
            }, 800);
        }

        window.onload = initWeb3;
    </script>
</body>
</html>
